name: Release CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD JOBS
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            archive: vss-linux-x64.tar.gz
            exe: vss

          - os: macos-latest
            label: macos-arm64
            archive: vss-macos-arm64.tar.gz
            exe: vss

          - os: macos-13
            label: macos-x64
            archive: vss-macos-x64.tar.gz
            exe: vss

          - os: windows-latest
            label: windows-x64
            archive: vss-windows-x64.zip
            exe: vss.exe

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Extract version from tag ─────────────────────────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building VSS version: $TAG"

      # ── Compiler setup (Linux) ───────────────────────────────────────────────
      - name: Set up GCC (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential

      # ── Compiler setup (Windows via MSYS2) ──────────────────────────────────
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: mingw-w64-x86_64-gcc

      # ── Compile: Unix ────────────────────────────────────────────────────────
      - name: Compile VSS (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd vss
          make clean
          make VERSION=${{ steps.version.outputs.VERSION }} BUILD_TYPE=Release

      # ── Compile: Windows ─────────────────────────────────────────────────────
      - name: Compile VSS (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd vss
          gcc -std=c11 -Wall -Wextra -pedantic \
            -DVSS_VERSION_STRING=\"${{ steps.version.outputs.VERSION }}\" \
            -DVSS_BUILD_TYPE=\"Release\" \
            -Iinclude \
            src/main.c src/token.c src/lexer.c src/ast.c src/value.c \
            src/env.c src/parser.c src/interpreter.c src/chunk.c \
            src/object.c src/compiler.c src/vm.c src/cli.c src/platform.c \
            -lws2_32 -o vss.exe

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke test binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          ./vss/vss version
          ./vss/vss examples/hello.vss

      - name: Smoke test binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          ./vss/vss.exe version

      # ── Assemble release folder ──────────────────────────────────────────────
      - name: Assemble release folder (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          DIST="vss-${{ matrix.label }}"
          mkdir -p "$DIST/stdlib" "$DIST/packages" "$DIST/examples"

          cp vss/vss                "$DIST/vss"
          cp README.md              "$DIST/README.md"     2>/dev/null || echo "No README.md at root"
          cp LICENSE                "$DIST/LICENSE"       2>/dev/null || echo "No LICENSE"
          cp CHANGELOG.md           "$DIST/CHANGELOG.md"  2>/dev/null || echo "No CHANGELOG"
          cp vss/stdlib/*.vss       "$DIST/stdlib/"       2>/dev/null || true
          cp vss/packages/*.vss     "$DIST/packages/"     2>/dev/null || true
          cp vss/examples/*.vss     "$DIST/examples/"     2>/dev/null || true

          chmod +x "$DIST/vss"
          echo "=== Release folder contents ==="
          find "$DIST" -type f

      - name: Assemble release folder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dist = "vss-windows-x64"
          New-Item -ItemType Directory -Force -Path "$dist/stdlib","$dist/packages","$dist/examples" | Out-Null

          Copy-Item "vss/vss.exe"     "$dist/vss.exe"
          if (Test-Path "README.md")    { Copy-Item "README.md"   "$dist/README.md" }
          if (Test-Path "LICENSE")      { Copy-Item "LICENSE"     "$dist/LICENSE" }
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" "$dist/CHANGELOG.md" }
          Get-ChildItem "vss/stdlib"   -Filter *.vss -ErrorAction SilentlyContinue | Copy-Item -Destination "$dist/stdlib/"
          Get-ChildItem "vss/packages" -Filter *.vss -ErrorAction SilentlyContinue | Copy-Item -Destination "$dist/packages/"
          Get-ChildItem "vss/examples" -Filter *.vss -ErrorAction SilentlyContinue | Copy-Item -Destination "$dist/examples/"

          Write-Host "=== Release folder contents ==="
          Get-ChildItem -Recurse "$dist"

      # ── Compress archive ─────────────────────────────────────────────────────
      - name: Compress archive (Unix tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf "${{ matrix.archive }}" "vss-${{ matrix.label }}"

      - name: Compress archive (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "vss-windows-x64" -DestinationPath "${{ matrix.archive }}"

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # RELEASE JOB – runs only after all builds pass
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download all build artifacts ─────────────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # ── List everything to confirm ───────────────────────────────────────────
      - name: List release assets
        run: |
          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Generate SHA256SUMS ──────────────────────────────────────────────────
      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum *.tar.gz *.zip > SHA256SUMS
          cat SHA256SUMS

      # ── Publish release with auto-generated release notes ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/vss-linux-x64.tar.gz
            release-assets/vss-macos-arm64.tar.gz
            release-assets/vss-macos-x64.tar.gz
            release-assets/vss-windows-x64.zip
            release-assets/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
